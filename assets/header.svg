<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-label="Omar Al Jashmi — turning messy data into clear stories">
  <!-- cream card -->
  <rect x="2" y="2" width="1196" height="276" rx="22" fill="#f7f3e7" stroke="#15803d" stroke-opacity=".25" stroke-width="2"/>

  <!-- pitch panel on the right -->
  <g>
    <rect x="800" y="22" width="378" height="236" rx="16" fill="#123a26"/>
    <!-- field markings -->
    <g stroke="#f3efdf" stroke-opacity=".28" fill="none" stroke-width="2">
      <rect x="820" y="42" width="338" height="196" rx="8"/>
      <line x1="989" y1="42" x2="989" y2="238"/>
      <circle cx="989" cy="140" r="34"/>
    </g>
    <!-- data over the pitch: rising line -->
    <polyline points="846,206 896,178 946,188 1006,132 1066,142 1126,86"
              fill="none" stroke="#56d68a" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <g fill="#f7f3e7">
      <circle cx="846" cy="206" r="6"/>
      <circle cx="896" cy="178" r="6"/>
      <circle cx="946" cy="188" r="6"/>
      <circle cx="1006" cy="132" r="6"/>
      <circle cx="1066" cy="142" r="6"/>
      <circle cx="1126" cy="86" r="7"/>
    </g>
    <!-- donut in the top-left corner of the pitch -->
    <g transform="translate(862,84)">
      <circle r="26" fill="none" stroke="#f3efdf" stroke-opacity=".35" stroke-width="12"/>
      <path d="M 0 -26 A 26 26 0 1 1 -24.7 8.0" fill="none" stroke="#7fd6a0" stroke-width="12" stroke-linecap="round"/>
    </g>
  </g>

  <!-- words -->
  <g font-family="'Segoe UI', -apple-system, 'Helvetica Neue', Arial, sans-serif">
    <text x="64" y="86" fill="#15803d" font-size="17" font-weight="700" letter-spacing="6">TURNING MESSY DATA INTO CLEAR STORIES</text>
    <text x="62" y="152" fill="#16281e" font-size="58" font-weight="800" letter-spacing="-1">Omar Al Jashmi</text>
    <text x="64" y="196" fill="#5f6f5f" font-size="21">data science @ penn state · data engineering intern @ BALANX-Bio</text>
    <text x="64" y="238" fill="#5f6f5f" font-size="17">Oman → Penn State  ·  عربي + English  ·  builder of Data Insight Studio</text>
  </g>
</svg>
